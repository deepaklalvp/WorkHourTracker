<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Work Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>

<!-- LOGIN BOX -->
<div class="box" id="loginBox">
  <h2>⚡ Work Tracker</h2>

  <div class="field">
    <input id="username" placeholder=" " required>
    <label>Username</label>
  </div>

  <div class="field">
    <input id="password" type="password" placeholder=" " required>
    <label>Password</label>
  </div>

  <button class="primary" onclick="login()">Login</button>
  <div id="loginError"></div>
</div>

<!-- APP BOX -->
<div class="box hidden" id="appBox">
  <h2>⚡ Work Tracker</h2>

  <div id="userDisplay"></div>

  <div id="clockDisplay" style="text-align:center; margin-top:10px; text-shadow:0 0 8px #00f7ff;"></div>

  <button class="logout" onclick="logout()">Logout</button>

  <!-- LOGIN TIME -->
  <label>Login Time:</label>
  <div class="time-row">
    <select id="loginHour"></select>
    <select id="loginMinute"></select>
    <select id="loginAMPM">
      <option>AM</option>
      <option>PM</option>
    </select>
  </div>

  <!-- BREAKS -->
  <div class="field">
    <textarea id="breakTimes" placeholder=" "></textarea>
    <label>Breaks (minutes)</label>
  </div>

  <!-- WORK HOURS -->
  <div class="field">
    <select id="workHours">
      <option value="" disabled selected hidden></option>
      <option value="480">8 hrs</option>
      <option value="450">7.5 hrs</option>
      <option value="540">9 hrs</option>
    </select>
    <label>Work Duration</label>
  </div>

  <!-- OUTPUT -->
  <div class="result" id="result"></div>
  <div class="break-total" id="totalBreak"></div>

  <!-- OVERTIME / STATUS -->
  <div class="leave-time" id="leaveTime"></div>
  <div class="leave-time" id="countdown"></div>

  <!-- PROGRESS -->
  <div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
