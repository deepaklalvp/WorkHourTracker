<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Work Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>⚡ Work Tracker</h2>

  <div class="field">
    <input id="username" placeholder=" " required>
    <label>Username</label>
  </div>

  <div class="field">
    <input id="password" type="password" placeholder=" " required>
    <label>Password</label>
  </div>

  <button class="primary" onclick="login()">Login</button>
  <div id="loginError"></div>
</div>

<!-- APP -->
<div class="box hidden" id="appBox">
  <h2>⚡ Work Tracker</h2>

  <div id="userDisplay"></div>
  <div id="clockDisplay"></div>

  <button class="logout" onclick="logout()">Logout</button>

  <label>Login Time:</label>
  <div style="display:flex; gap:5px;">
    <select id="loginHour"></select>
    <select id="loginMinute"></select>
    <select id="loginAMPM">
      <option>AM</option><option>PM</option>
    </select>
  </div>

  <div class="field">
    <textarea id="breakTimes" placeholder=" "></textarea>
    <label>Breaks (minutes)</label>
  </div>

  <div class="field">
    <select id="workHours" required>
      <option value="" disabled selected hidden></option>
      <option value="480">8 hrs</option>
      <option value="360">6 hrs</option>
      <option value="600">10 hrs</option>
    </select>
    <label>Work Duration</label>
  </div>

  <div class="result" id="result"></div>
  <div class="break-total" id="totalBreak"></div>
  <div class="remaining" id="remaining"></div>
  <div class="leave-time" id="leaveTime"></div>
  <div class="leave-time" id="countdown"></div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
