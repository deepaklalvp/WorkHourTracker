<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Work Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<button class="theme-toggle" onclick="toggleTheme()">☀️</button>

<!-- LOGIN PAGE -->
<div class="box" id="loginBox">
  <h2>⚡ Work Tracker</h2>

  <div class="field">
    <input id="username" placeholder=" ">
    <label>Username</label>
  </div>

  <div class="field">
    <input id="password" type="password" placeholder=" ">
    <label>Password</label>
  </div>

  <button class="primary" onclick="login()">Login</button>
  <div id="loginError" style="text-align:center;margin-top:10px;color:#ff4b2b;"></div>
</div>

<!-- APP PAGE -->
<div class="box hidden" id="appBox">
  <h2>⚡ Work Tracker</h2>

  <div id="userDisplay" style="text-align:center;"></div>
  <div id="clockDisplay" style="text-align:center;margin-top:10px;"></div>

  <button class="logout" onclick="logout()">Logout</button>

  <label>Login Time:</label>
  <div style="display:flex;gap:5px;">
    <select id="loginHour"></select>
    <select id="loginMinute"></select>
    <select id="loginAMPM">
      <option>AM</option>
      <option>PM</option>
    </select>
  </div>

  <div class="field">
    <textarea id="breakTimes" placeholder=" "></textarea>
    <label>Breaks (minutes)</label>
  </div>

  <div class="field">
    <select id="workHours">
      <option value="480">8 hrs</option>
      <option value="450">7.5 hrs</option>
      <option value="540">9 hrs</option>
    </select>
    <label>Work Duration</label>
  </div>

  <div class="leave-time" id="leaveTime"></div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
